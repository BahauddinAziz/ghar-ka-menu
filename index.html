<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kya Banaye? — Ghar Ka Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FBF7EF;
    --ink: #1C1A16;
    --haldi: #E8A200;
    --haldi-soft: #F7E4B0;
    --mirch: #B3361D;
    --steel: #8A857B;
    --line: #E4DDCE;
    --card: #FFFFFF;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { font-size: 16px; }
  body {
    font-family: 'Outfit', system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: 60px;
  }
  .wrap { max-width: 520px; margin: 0 auto; padding: 0 18px; }

  /* ---------- header ---------- */
  header { padding: 26px 0 10px; }
  .eyebrow {
    font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--steel); font-weight: 700;
  }
  h1 {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800; font-size: 2.6rem; line-height: 1.02; margin-top: 4px;
  }
  h1 .q { color: var(--haldi); }

  /* ---------- suggest panel ---------- */
  .suggest {
    margin-top: 18px; background: var(--ink); border-radius: var(--radius);
    padding: 18px; color: var(--paper);
  }
  .seg {
    display: flex; gap: 6px; background: rgba(255,255,255,0.08);
    border-radius: 10px; padding: 4px;
  }
  .seg + .seg { margin-top: 6px; }
  .seg button {
    flex: 1; border: 0; background: transparent; color: var(--paper);
    font-family: inherit; font-weight: 700; font-size: 0.9rem;
    padding: 10px 4px; border-radius: 8px; cursor: pointer;
  }
  .seg button.on { background: var(--haldi); color: var(--ink); }
  .plate {
    margin-top: 14px; background: var(--card); color: var(--ink);
    border-radius: 12px; padding: 18px 16px; text-align: center;
    min-height: 120px; display: flex; flex-direction: column;
    justify-content: center; gap: 6px;
    transform-origin: center bottom;
  }
  .plate.serve { animation: serve 0.32s cubic-bezier(.2,.9,.3,1.2); }
  @keyframes serve {
    from { opacity: 0; transform: translateY(14px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @media (prefers-reduced-motion: reduce) { .plate.serve { animation: none; } }
  .plate .dish {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800; font-size: 1.7rem; line-height: 1.1;
  }
  .plate .meta { font-size: 0.85rem; color: var(--steel); }
  .plate .prep {
    display: inline-block; margin: 2px auto 0; font-size: 0.8rem; font-weight: 500;
    color: var(--mirch); background: #F9E9E4; border-radius: 999px; padding: 3px 12px;
  }
  .plate .hint { font-size: 0.95rem; color: var(--steel); }
  .plate .ing { font-size: 0.8rem; color: var(--steel); }
  .plate .vlink { font-size: 0.82rem; font-weight: 700; color: var(--mirch); text-decoration: none; }
  .actions { display: flex; gap: 8px; margin-top: 12px; }
  .actions button {
    flex: 1; border: 0; border-radius: 10px; padding: 13px 8px;
    font-family: inherit; font-weight: 700; font-size: 0.95rem; cursor: pointer;
  }
  .btn-yes { background: var(--haldi); color: var(--ink); }
  .btn-next { background: rgba(255,255,255,0.12); color: var(--paper); }

  /* ---------- dish list ---------- */
  section.list { margin-top: 26px; }
  .sec-head {
    display: flex; align-items: baseline; justify-content: space-between;
    border-bottom: 2px solid var(--ink); padding-bottom: 6px; margin-bottom: 4px;
  }
  .sec-head h2 {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-weight: 800; font-size: 1.15rem; letter-spacing: 0.01em;
  }
  .sec-head span { font-size: 0.75rem; color: var(--steel); font-weight: 500; }
  .row {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 2px; border-bottom: 1px solid var(--line);
  }
  .row .info { flex: 1; min-width: 0; }
  .row .name { font-weight: 700; font-size: 1.02rem; }
  .row .sub { font-size: 0.78rem; color: var(--steel); margin-top: 2px; }
  .row .sub .prep-note { color: var(--mirch); }
  .count {
    font-size: 0.72rem; font-weight: 700; color: var(--ink);
    background: var(--haldi-soft); border-radius: 999px;
    padding: 3px 9px; white-space: nowrap;
  }
  .count.zero { background: transparent; color: var(--steel); border: 1px dashed var(--line); }
  .bana {
    border: 2px solid var(--ink); background: transparent; color: var(--ink);
    font-family: inherit; font-weight: 700; font-size: 0.85rem;
    border-radius: 999px; padding: 8px 14px; cursor: pointer; white-space: nowrap;
  }
  .bana.done { background: var(--ink); color: var(--haldi); border-color: var(--ink); }
  .del {
    border: 0; background: transparent; color: var(--steel);
    font-size: 1.1rem; cursor: pointer; padding: 6px 4px; line-height: 1;
  }

  /* ---------- dish detail (expand) ---------- */
  .row .info { cursor: pointer; }
  .detail { padding: 4px 2px 14px; border-bottom: 1px solid var(--line); }
  .detail label {
    display: block; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--steel); margin: 10px 0 4px;
  }
  .detail input[type=text], .detail select {
    width: 100%; border: 1px solid var(--line); border-radius: 8px;
    padding: 9px 10px; font-family: inherit; font-size: 0.88rem; background: var(--card);
  }
  .d-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .d-actions button, .d-actions a {
    border: 2px solid var(--ink); background: transparent; color: var(--ink); text-decoration: none;
    font-family: inherit; font-weight: 700; font-size: 0.8rem; border-radius: 999px;
    padding: 7px 13px; cursor: pointer; display: inline-block;
  }
  .d-actions .primary { background: var(--ink); color: var(--paper); }
  .d-actions a.watch { color: var(--mirch); border-color: var(--mirch); }

  /* ---------- grocery / stock ---------- */
  .g-row { display: flex; align-items: center; gap: 10px; padding: 10px 2px; border-bottom: 1px solid var(--line); }
  .g-row .g-name { flex: 1; font-weight: 600; font-size: 0.98rem; }
  .g-row.have .g-name { color: var(--steel); }
  .g-tag { font-size: 0.7rem; font-weight: 700; border-radius: 999px; padding: 3px 10px; white-space: nowrap; }
  .g-row.need .g-tag { background: #F9E9E4; color: var(--mirch); }
  .g-row.have .g-tag { background: var(--haldi-soft); color: var(--ink); }
  .g-btn {
    border: 2px solid var(--ink); background: transparent; color: var(--ink);
    font-family: inherit; font-weight: 700; font-size: 0.78rem;
    border-radius: 999px; padding: 6px 12px; cursor: pointer; white-space: nowrap;
  }
  .g-add { display: flex; gap: 8px; margin-top: 12px; }
  .g-add input {
    flex: 1; border: 1px solid var(--line); border-radius: 10px;
    padding: 11px 12px; font-family: inherit; font-size: 0.92rem; background: var(--card);
  }
  .g-add button {
    border: 0; background: var(--ink); color: var(--paper); font-family: inherit;
    font-weight: 700; border-radius: 10px; padding: 0 18px; cursor: pointer;
  }

  /* ---------- history / diary ---------- */
  .diary-row {
    display: flex; align-items: baseline; gap: 12px;
    padding: 11px 2px; border-bottom: 1px solid var(--line);
  }
  .diary-row .date {
    flex: 0 0 92px; font-size: 0.78rem; font-weight: 700;
    color: var(--steel); text-transform: uppercase; letter-spacing: 0.04em;
  }
  .diary-row .date.today { color: var(--mirch); }
  .diary-row .made { flex: 1; font-weight: 600; font-size: 0.95rem; line-height: 1.45; }

  /* ---------- add form ---------- */
  .add { margin-top: 30px; background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; }
  .add h3 { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: 1rem; margin-bottom: 10px; }
  .add input[type=text] {
    width: 100%; border: 1px solid var(--line); border-radius: 10px;
    padding: 12px; font-family: inherit; font-size: 0.95rem; background: var(--paper);
    margin-bottom: 8px;
  }
  .add input[type=text]:focus { outline: 2px solid var(--haldi); border-color: transparent; }
  .type-pick { display: flex; gap: 8px; margin-bottom: 8px; }
  .type-pick button {
    flex: 1; border: 1px solid var(--line); background: var(--paper); border-radius: 10px;
    padding: 10px; font-family: inherit; font-weight: 700; font-size: 0.85rem; cursor: pointer; color: var(--steel);
  }
  .type-pick button.on { border-color: var(--ink); color: var(--ink); background: var(--haldi-soft); }
  #prepWrap { display: none; }
  #prepWrap.show { display: block; }
  .add .save {
    width: 100%; border: 0; background: var(--ink); color: var(--paper);
    font-family: inherit; font-weight: 700; font-size: 0.95rem;
    border-radius: 10px; padding: 13px; cursor: pointer;
  }
  footer { margin-top: 26px; text-align: center; font-size: 0.72rem; color: var(--steel); letter-spacing: 0.14em; text-transform: uppercase; }

  /* toast */
  #toast {
    position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%) translateY(80px);
    background: var(--ink); color: var(--paper); font-size: 0.85rem; font-weight: 500;
    padding: 10px 18px; border-radius: 999px; transition: transform 0.25s ease; z-index: 50;
    max-width: 90vw; text-align: center;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  button:focus-visible, input:focus-visible { outline: 2px solid var(--haldi); outline-offset: 2px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Ghar Ka Menu</div>
    <h1>Kya banaye<span class="q">?</span></h1>
  </header>

  <div class="suggest">
    <div class="seg" role="tablist" aria-label="Time available">
      <button id="segQuick" class="on" onclick="setMode('quick')">Jhatpat &#9889;</button>
      <button id="segAny" onclick="setMode('any')">Time hai &#128522;</button>
    </div>
    <div class="seg" role="tablist" aria-label="Effort">
      <button id="effAny" class="on" onclick="setEffort('any')">Koi bhi</button>
      <button id="effEasy" onclick="setEffort('easy')">Easy</button>
      <button id="effTough" onclick="setEffort('tough')">Tough &#128170;</button>
    </div>
    <div class="plate" id="plate">
      <div class="hint">Tap "Suggest" and let the kitchen decide.</div>
    </div>
    <div class="actions">
      <button class="btn-next" onclick="suggest()" id="suggestBtn">Suggest</button>
      <button class="btn-yes" onclick="cookSuggested()" id="cookBtn" style="display:none">Banate hain! &#10003;</button>
    </div>
  </div>

  <section class="list">
    <div class="sec-head"><h2>Jhatpat &#9889;</h2><span>no prep — cook now</span></div>
    <div id="quickList"></div>
  </section>

  <section class="list">
    <div class="sec-head"><h2>Plan Ahead &#9200;</h2><span>soak / marinate first</span></div>
    <div id="planList"></div>
  </section>

  <section class="list">
    <div class="sec-head"><h2>Rasoi Stock &#129530;</h2><span>kya lana hai / kya hai</span></div>
    <div id="groceryList"></div>
    <div class="g-add">
      <input type="text" id="newGrocery" placeholder="Add item (e.g. paneer)" maxlength="40">
      <button onclick="addGrocery()">Add</button>
    </div>
  </section>

  <section class="list">
    <div class="sec-head"><h2>Kitchen Diary &#128214;</h2><span>kis din kya bana</span></div>
    <div id="historyList"></div>
  </section>

  <div class="add">
    <h3>Add a dish</h3>
    <input type="text" id="newName" placeholder="Dish name (e.g. Rajma Chawal)" maxlength="40">
    <div class="type-pick">
      <button id="tQuick" class="on" onclick="pickType('quick')">Jhatpat</button>
      <button id="tPlan" onclick="pickType('plan')">Plan ahead</button>
    </div>
    <div id="prepWrap">
      <input type="text" id="newPrep" placeholder="Prep note (e.g. soak rajma overnight)" maxlength="60">
    </div>
    <div class="type-pick">
      <button id="eEasy" class="on" onclick="pickEffort('easy')">Easy</button>
      <button id="eTough" onclick="pickEffort('tough')">Tough &#128170;</button>
    </div>
    <input type="text" id="newIng" placeholder="Ingredients, comma separated (optional)" maxlength="200">
    <input type="text" id="newVideo" placeholder="YouTube link (blank = auto recipe search)" maxlength="200">
    <button class="save" onclick="addDish()">Add to menu</button>
  </div>

  <footer>Ghar Ka Menu &bull; est. 2026</footer>
</div>
<div id="toast" role="status"></div>

<script>
/* ---------- Supabase sync (shared family menu) ---------- */
const SB_URL = 'https://sjkirytdnlgmcbfryqix.supabase.co/rest/v1';
const SB_KEY = 'sb_publishable_cH4fjvp3W7qc76z3zWChaw_Uyt19RI3';
const CACHE_KEY = 'gharKaMenu.v3';

const cached = loadCache();
let dishes = cached.dishes;
let grocery = cached.grocery;
let mode = 'quick';
let effortMode = 'any';
let addType = 'quick';
let addEffort = 'easy';
let suggested = null;
let expandedId = null;

async function sb(path, opts = {}) {
  const res = await fetch(SB_URL + path, {
    ...opts,
    headers: { apikey: SB_KEY, 'Content-Type': 'application/json', ...(opts.headers || {}) }
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.status === 204 ? null : res.json();
}

function loadCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (raw) {
      const c = JSON.parse(raw);
      return { dishes: c.dishes || [], grocery: c.grocery || [] };
    }
  } catch (e) { /* no cache yet */ }
  return { dishes: [], grocery: [] };
}
function saveCache() {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ dishes, grocery })); } catch (e) { /* private mode etc. */ }
}

async function refresh(quiet) {
  try {
    const [dRows, gRows] = await Promise.all([
      sb('/dishes?select=id,name,type,prep,effort,ingredients,video_url,cook_log(cooked_on)&order=created_at'),
      sb('/grocery?select=id,name,status&order=created_at')
    ]);
    dishes = dRows.map(r => ({
      id: r.id, name: r.name, type: r.type, prep: r.prep || '',
      effort: r.effort || 'easy',
      ingredients: Array.isArray(r.ingredients) ? r.ingredients : [],
      video: r.video_url || '',
      log: (r.cook_log || []).map(x => x.cooked_on).sort()
    }));
    grocery = gRows;
    saveCache(); render();
  } catch (e) {
    if (!quiet) toast(dishes.length ? 'Offline — showing last synced menu' : 'Could not reach the menu — check internet');
    render();
  }
}

function videoLink(d) {
  return d.video || 'https://www.youtube.com/results?search_query=' + encodeURIComponent(d.name + ' recipe');
}
function cleanUrl(u) {
  u = (u || '').trim();
  return /^https?:\/\//i.test(u) ? u : '';
}
function parseIng(s) {
  return (s || '').split(',').map(x => x.trim()).filter(Boolean);
}

const today = () => new Date().toISOString().slice(0, 10);
function daysSince(d) {
  if (!d.log.length) return null;
  const last = d.log[d.log.length - 1];
  return Math.floor((new Date(today()) - new Date(last)) / 86400000);
}
function monthCount(d) {
  const m = today().slice(0, 7);
  return d.log.filter(x => x.startsWith(m)).length;
}
function lastLabel(d) {
  const n = daysSince(d);
  if (n === null) return 'never cooked';
  if (n === 0) return 'made today';
  if (n === 1) return 'yesterday';
  return n + ' days ago';
}

/* ---------- suggestion ---------- */
function setMode(m) {
  mode = m;
  document.getElementById('segQuick').classList.toggle('on', m === 'quick');
  document.getElementById('segAny').classList.toggle('on', m === 'any');
  suggested = null;
  resetPlate();
}
function setEffort(e) {
  effortMode = e;
  document.getElementById('effAny').classList.toggle('on', e === 'any');
  document.getElementById('effEasy').classList.toggle('on', e === 'easy');
  document.getElementById('effTough').classList.toggle('on', e === 'tough');
  suggested = null;
  resetPlate();
}
function resetPlate() {
  const p = document.getElementById('plate');
  p.innerHTML = '<div class="hint">Tap "Suggest" and let the kitchen decide.</div>';
  document.getElementById('cookBtn').style.display = 'none';
  document.getElementById('suggestBtn').textContent = 'Suggest';
}
function pool() {
  return dishes.filter(d =>
    (mode === 'any' || d.type === 'quick') &&
    (effortMode === 'any' || (d.effort || 'easy') === effortMode)
  );
}
function suggest() {
  const cands = pool().filter(d => !suggested || d.id !== suggested.id);
  if (!cands.length) { toast('No dishes to suggest — add some below'); return; }
  // rank: never-cooked first, then longest ago; small shuffle among top 3
  cands.sort((a, b) => {
    const da = daysSince(a), db = daysSince(b);
    if (da === null && db === null) return 0;
    if (da === null) return -1;
    if (db === null) return 1;
    return db - da;
  });
  const top = cands.slice(0, Math.min(3, cands.length));
  suggested = top[Math.floor(Math.random() * top.length)];
  const p = document.getElementById('plate');
  p.classList.remove('serve'); void p.offsetWidth;
  p.classList.add('serve');
  p.innerHTML =
    '<div class="dish">' + esc(suggested.name) + '</div>' +
    '<div class="meta">' + lastLabel(suggested) + ' &bull; ' + monthCount(suggested) + '&times; this month' +
      ((suggested.effort || 'easy') === 'tough' ? ' &bull; tough &#128170;' : '') + '</div>' +
    (suggested.type === 'plan' ? '<div class="prep">&#9200; ' + esc(suggested.prep || 'needs prep time') + '</div>' : '') +
    (suggested.ingredients && suggested.ingredients.length
      ? '<div class="ing">' + suggested.ingredients.map(esc).join(' &bull; ') + '</div>' : '') +
    '<a class="vlink" href="' + esc(videoLink(suggested)) + '" target="_blank" rel="noopener">&#9654; Recipe video</a>';
  document.getElementById('cookBtn').style.display = '';
  document.getElementById('suggestBtn').textContent = 'Nahi, next';
}
function cookSuggested() {
  if (!suggested) return;
  logToday(suggested.id, true);
  toast(suggested.name + ' — likh liya! Happy cooking \uD83C\uDF72');
  suggested = null;
  resetPlate();
}

/* ---------- logging ---------- */
async function logToday(id, force) {
  const d = dishes.find(x => x.id === id);
  if (!d) return;
  const t = today();
  const has = d.log.includes(t);
  if (has && force) return;
  // optimistic update, revert on sync failure
  if (has) d.log = d.log.filter(x => x !== t);   // toggle off = undo
  else { d.log.push(t); d.log.sort(); }
  saveCache(); render();
  try {
    if (has) {
      await sb('/cook_log?dish_id=eq.' + d.id + '&cooked_on=eq.' + t, { method: 'DELETE' });
      toast('Removed today\u2019s entry for ' + d.name);
    } else {
      await sb('/cook_log', { method: 'POST', body: JSON.stringify({ dish_id: d.id, cooked_on: t }) });
    }
  } catch (e) {
    if (!has && String(e).includes('409')) return; // someone else already logged it \u2014 fine
    if (has) { d.log.push(t); d.log.sort(); } else { d.log = d.log.filter(x => x !== t); }
    saveCache(); render();
    toast('Could not sync \u2014 check internet');
  }
}

/* ---------- add / remove ---------- */
function pickType(t) {
  addType = t;
  document.getElementById('tQuick').classList.toggle('on', t === 'quick');
  document.getElementById('tPlan').classList.toggle('on', t === 'plan');
  document.getElementById('prepWrap').classList.toggle('show', t === 'plan');
}
function pickEffort(e) {
  addEffort = e;
  document.getElementById('eEasy').classList.toggle('on', e === 'easy');
  document.getElementById('eTough').classList.toggle('on', e === 'tough');
}
async function addDish() {
  const name = document.getElementById('newName').value.trim();
  if (!name) { toast('Give the dish a name first'); return; }
  const prep = addType === 'plan' ? document.getElementById('newPrep').value.trim() : '';
  const ingredients = parseIng(document.getElementById('newIng').value);
  const video_url = cleanUrl(document.getElementById('newVideo').value);
  try {
    const rows = await sb('/dishes', {
      method: 'POST',
      body: JSON.stringify({ name, type: addType, prep, effort: addEffort, ingredients, video_url }),
      headers: { Prefer: 'return=representation' }
    });
    const r = rows[0];
    dishes.push({
      id: r.id, name: r.name, type: r.type, prep: r.prep || '',
      effort: r.effort || 'easy', ingredients: r.ingredients || [], video: r.video_url || '', log: []
    });
    ['newName', 'newPrep', 'newIng', 'newVideo'].forEach(i => document.getElementById(i).value = '');
    saveCache(); render();
    toast(name + ' added to the menu');
  } catch (e) {
    toast('Could not add — check internet');
  }
}
async function saveDetail(id) {
  const d = dishes.find(x => x.id === id);
  if (!d) return;
  const ingredients = parseIng(document.getElementById('ing-' + id).value);
  const video_url = cleanUrl(document.getElementById('vid-' + id).value);
  const effort = document.getElementById('eff-' + id).value;
  try {
    await sb('/dishes?id=eq.' + id, {
      method: 'PATCH',
      body: JSON.stringify({ ingredients, video_url, effort })
    });
    d.ingredients = ingredients; d.video = video_url; d.effort = effort;
    expandedId = null;
    saveCache(); render();
    toast(d.name + ' updated');
  } catch (e) {
    toast('Could not save — check internet');
  }
}
async function removeDish(id) {
  const d = dishes.find(x => x.id === id);
  if (!d) return;
  if (!confirm('Remove "' + d.name + '" from the menu?')) return;
  try {
    await sb('/dishes?id=eq.' + id, { method: 'DELETE' });
    dishes = dishes.filter(x => x.id !== id);
    saveCache(); render();
  } catch (e) {
    toast('Could not remove — check internet');
  }
}

/* ---------- grocery / stock ---------- */
async function addGrocery() {
  const name = document.getElementById('newGrocery').value.trim();
  if (!name) { toast('Item ka naam likho'); return; }
  try {
    const rows = await sb('/grocery', {
      method: 'POST',
      body: JSON.stringify({ name, status: 'need' }),
      headers: { Prefer: 'return=representation' }
    });
    grocery.push(rows[0]);
    document.getElementById('newGrocery').value = '';
    saveCache(); render();
  } catch (e) {
    toast('Could not add — check internet');
  }
}
async function toggleGrocery(id) {
  const g = grocery.find(x => x.id === id);
  if (!g) return;
  const next = g.status === 'need' ? 'have' : 'need';
  const prev = g.status;
  g.status = next; saveCache(); render();
  try {
    await sb('/grocery?id=eq.' + id, { method: 'PATCH', body: JSON.stringify({ status: next }) });
  } catch (e) {
    g.status = prev; saveCache(); render();
    toast('Could not sync — check internet');
  }
}
async function delGrocery(id) {
  const g = grocery.find(x => x.id === id);
  if (!g) return;
  try {
    await sb('/grocery?id=eq.' + id, { method: 'DELETE' });
    grocery = grocery.filter(x => x.id !== id);
    saveCache(); render();
  } catch (e) {
    toast('Could not remove — check internet');
  }
}
async function ingToGrocery(dishId) {
  const d = dishes.find(x => x.id === dishId);
  if (!d || !d.ingredients.length) { toast('No ingredients listed for this dish'); return; }
  const known = new Set(grocery.map(g => g.name.trim().toLowerCase()));
  const missing = d.ingredients.filter(i => !known.has(i.trim().toLowerCase()));
  if (!missing.length) { toast('Sab kuch already list mein hai'); return; }
  try {
    const rows = await sb('/grocery', {
      method: 'POST',
      body: JSON.stringify(missing.map(name => ({ name, status: 'need' }))),
      headers: { Prefer: 'return=representation' }
    });
    grocery = grocery.concat(rows);
    saveCache(); render();
    toast(missing.length + ' item' + (missing.length > 1 ? 's' : '') + ' added to shopping list');
  } catch (e) {
    toast('Could not add — check internet');
  }
}

/* ---------- render ---------- */
function esc(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toggleDetail(id) {
  expandedId = expandedId === id ? null : id;
  render();
}
function detailHtml(d) {
  return '<div class="detail">' +
    '<label for="ing-' + d.id + '">Ingredients (comma separated)</label>' +
    '<input type="text" id="ing-' + d.id + '" value="' + esc(d.ingredients.join(', ')) + '" maxlength="200">' +
    '<label for="vid-' + d.id + '">Recipe video (YouTube link)</label>' +
    '<input type="text" id="vid-' + d.id + '" value="' + esc(d.video) + '" placeholder="blank = auto recipe search" maxlength="200">' +
    '<label for="eff-' + d.id + '">Effort</label>' +
    '<select id="eff-' + d.id + '">' +
      '<option value="easy"' + (d.effort !== 'tough' ? ' selected' : '') + '>Easy</option>' +
      '<option value="tough"' + (d.effort === 'tough' ? ' selected' : '') + '>Tough &#128170;</option>' +
    '</select>' +
    '<div class="d-actions">' +
      '<button class="primary" onclick="saveDetail(\'' + d.id + '\')">Save</button>' +
      '<button onclick="ingToGrocery(\'' + d.id + '\')">+ Shopping list</button>' +
      '<a class="watch" href="' + esc(videoLink(d)) + '" target="_blank" rel="noopener">&#9654; Watch recipe</a>' +
    '</div>' +
  '</div>';
}
function rowHtml(d) {
  const c = monthCount(d);
  const doneToday = d.log.includes(today());
  return '<div class="row">' +
    '<div class="info" onclick="toggleDetail(\'' + d.id + '\')">' +
      '<div class="name">' + esc(d.name) + ((d.effort || 'easy') === 'tough' ? ' &#128170;' : '') + '</div>' +
      '<div class="sub">' + lastLabel(d) +
        (d.type === 'plan' && d.prep ? ' &bull; <span class="prep-note">' + esc(d.prep) + '</span>' : '') +
        ' &bull; ' + (expandedId === d.id ? 'tap to close &#9652;' : 'details &#9662;') +
      '</div>' +
    '</div>' +
    '<span class="count' + (c ? '' : ' zero') + '">' + c + '&times;</span>' +
    '<button class="bana' + (doneToday ? ' done' : '') + '" onclick="logToday(\'' + d.id + '\')">' +
      (doneToday ? '&#10003; Aaj bana' : 'Bana!') + '</button>' +
    '<button class="del" aria-label="Remove dish" onclick="removeDish(\'' + d.id + '\')">&times;</button>' +
  '</div>' +
  (expandedId === d.id ? detailHtml(d) : '');
}
function groceryHtml() {
  if (!grocery.length) return '<div class="row"><div class="sub">Stock khali — add items below, or open a dish and tap "+ Shopping list".</div></div>';
  const order = { need: 0, have: 1 };
  return grocery.slice().sort((a, b) => order[a.status] - order[b.status] || a.name.localeCompare(b.name)).map(g =>
    '<div class="g-row ' + g.status + '">' +
      '<div class="g-name">' + esc(g.name) + '</div>' +
      '<span class="g-tag">' + (g.status === 'need' ? '&#128722; lana hai' : '&#10003; ghar mein hai') + '</span>' +
      '<button class="g-btn" onclick="toggleGrocery(\'' + g.id + '\')">' + (g.status === 'need' ? 'Mil gaya' : 'Khatam') + '</button>' +
      '<button class="del" aria-label="Remove item" onclick="delGrocery(\'' + g.id + '\')">&times;</button>' +
    '</div>'
  ).join('');
}
function dateLabel(iso) {
  const t = today();
  if (iso === t) return 'Today';
  const diff = Math.floor((new Date(t) - new Date(iso)) / 86400000);
  if (diff === 1) return 'Yesterday';
  return new Date(iso + 'T00:00:00').toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short' });
}
function historyHtml() {
  const byDate = {};
  dishes.forEach(d => d.log.forEach(day => { (byDate[day] = byDate[day] || []).push(d.name); }));
  const days = Object.keys(byDate).sort().reverse().slice(0, 30);
  if (!days.length) return '<div class="row"><div class="sub">Nothing logged yet — tap "Bana!" when you cook.</div></div>';
  return days.map(day =>
    '<div class="diary-row">' +
      '<div class="date' + (day === today() ? ' today' : '') + '">' + dateLabel(day) + '</div>' +
      '<div class="made">' + byDate[day].map(esc).join(', ') + '</div>' +
    '</div>'
  ).join('');
}
function render() {
  document.getElementById('quickList').innerHTML =
    dishes.filter(d => d.type === 'quick').map(rowHtml).join('') || '<div class="row"><div class="sub">No quick dishes yet — add one below.</div></div>';
  document.getElementById('planList').innerHTML =
    dishes.filter(d => d.type === 'plan').map(rowHtml).join('') || '<div class="row"><div class="sub">No plan-ahead dishes yet — add one below.</div></div>';
  document.getElementById('historyList').innerHTML = historyHtml();
  document.getElementById('groceryList').innerHTML = groceryHtml();
}

let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

render();          // instant paint from cache
refresh();         // then sync from Supabase
document.addEventListener('visibilitychange', () => { if (!document.hidden) refresh(true); });
</script>
</body>
</html>
